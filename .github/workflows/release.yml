name: Release

on:
  release:
    types: [published]

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write   # required to upload assets to the release

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish (self-contained single file, win-x64)
        run: >
          dotnet publish src/RegionToShareEx/RegionToShareEx.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -o publish

      - name: Rename with version
        shell: pwsh
        run: Copy-Item publish/RegionToShareEx.exe "RegionToShareEx-${{ github.event.release.tag_name }}-win-x64.exe"

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: RegionToShareEx-${{ github.event.release.tag_name }}-win-x64.exe
