name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore src/RegionToShareEx/RegionToShareEx.csproj

      - name: Build
        run: dotnet build src/RegionToShareEx/RegionToShareEx.csproj -c Release --no-restore

      - name: Publish
        run: dotnet publish src/RegionToShareEx/RegionToShareEx.csproj -c Release -o publish --no-build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RegionToShareEx
          path: publish
